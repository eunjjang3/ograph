name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    if: github.repository == 'eunjjang3/ograph'
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        # actions/checkout@v6
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Verify release tag
        if: github.event_name == 'release'
        run: |
          case "$GITHUB_REF" in
            refs/tags/v*) ;;
            *) echo "Release publishing requires a v* tag, got $GITHUB_REF"; exit 1 ;;
          esac

      - name: Setup Node
        # actions/setup-node@v6
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22.14.0
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install npm with trusted publishing support
        run: npm install -g npm@11.5.1

      - name: Report toolchain
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Verify packed consumer install
        run: npm run verify:consumer

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Verify packed browser consumer
        run: npm run test:browser

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Publish dry run
        run: npm publish --dry-run --access public

      - name: Publish to npm
        if: github.event_name == 'release'
        run: npm publish --access public
