name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    if: github.repository == 'eunjjang3/ograph'
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        # actions/checkout@v6
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify release tag
        if: github.event_name == 'release'
        run: |
          case "$GITHUB_REF" in
            refs/tags/v*) ;;
            *) echo "Release publishing requires a v* tag, got $GITHUB_REF"; exit 1 ;;
          esac

      - name: Setup Node
        # actions/setup-node@v6
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22.14.0
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Prepare npm with trusted publishing support
        env:
          NPM_CLI_VERSION: 11.16.0
          NPM_CLI_TARBALL_SHA512: 03be172fc3b199c7a06433163e459be5b110a6983c1dd6305b7ac10f6b0fa12e1440755a8df6b1064ab2ccb789df0474919fb9c684e322dc57685ede21752ccb
        run: |
          npm_cli_tgz="npm-${NPM_CLI_VERSION}.tgz"
          npm_cli_dir="${RUNNER_TEMP}/npm-${NPM_CLI_VERSION}"
          curl -fsSLo "${npm_cli_tgz}" "https://registry.npmjs.org/npm/-/npm-${NPM_CLI_VERSION}.tgz"
          echo "${NPM_CLI_TARBALL_SHA512}  ${npm_cli_tgz}" | sha512sum --check
          mkdir -p "${npm_cli_dir}"
          tar -xzf "${npm_cli_tgz}" -C "${npm_cli_dir}" --strip-components=1
          echo "NPM_TRUSTED_CLI=${npm_cli_dir}/bin/npm-cli.js" >> "${GITHUB_ENV}"

      - name: Report toolchain
        run: |
          node --version
          npm --version
          node "${NPM_TRUSTED_CLI}" --version

      - name: Verify package release identity
        run: node scripts/verify-release-identity.mjs

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Verify packed consumer install (pinned baseline)
        run: npm run verify:consumer:pinned

      - name: Verify packed consumer install (floating compatibility)
        run: npm run verify:consumer:floating

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Verify packed browser consumer
        run: npm run test:browser

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Publish dry run
        run: node "${NPM_TRUSTED_CLI}" publish --dry-run --access public

      - name: Publish to npm
        if: github.event_name == 'release'
        run: node "${NPM_TRUSTED_CLI}" publish --access public
