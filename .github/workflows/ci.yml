name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        # actions/checkout@v7
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Setup Node
        # actions/setup-node@v7
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 22.14.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test

      - name: Typecheck
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Verify examples
        run: npm run check:examples

      - name: Verify packed consumer install (pinned baseline)
        run: npm run verify:consumer:pinned

      - name: Verify packed consumer install (floating compatibility)
        run: npm run verify:consumer:floating

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Verify packed browser consumer
        run: npm run test:browser

      - name: Verify package budgets
        run: npm run check:budgets

      - name: Verify package contents
        run: npm pack --dry-run
