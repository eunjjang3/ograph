name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test

      - name: Typecheck
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Verify examples
        run: npm run check:examples

      - name: Verify packed consumer install
        run: npm run verify:consumer

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Verify packed browser consumer
        run: npm run test:browser

      - name: Verify package budgets
        run: npm run check:budgets

      - name: Verify package contents
        run: npm pack --dry-run
